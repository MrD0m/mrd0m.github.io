<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominik Adelmann Portfolio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --c-prim: #666666;
            --c-prim-rgb: 102, 102, 102;
            --c-sec: #ffffff;
            --c-sec-rgb: 255, 255, 255;
            --c-bg: #1a1a1a;
        }

        body {
            margin: 0;
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Trebuchet MS', Arial, sans-serif;
            color: #dcdcdc;
            overflow: hidden;
            transition: background 1.5s ease-in-out;
            user-select: none;
        }

        /* --- BOOT OVERLAY --- */
        #boot-screen {
            position: fixed;
            inset: 0;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        .boot-cube {
            width: 120px;
            height: 120px;
            background: rgba(var(--c-prim-rgb), 0.8);
            border: 2px solid var(--c-sec);
            box-shadow: 0 0 40px rgba(var(--c-sec-rgb), 0.4), inset 0 0 20px rgba(var(--c-sec-rgb), 0.6);
            animation: boot-roll 2.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }

        @keyframes boot-roll {
            0% { transform: scale(0) rotate(-180deg) translateY(-200px); opacity: 0; }
            40% { transform: scale(1.2) rotate(450deg) translateY(0); opacity: 1; }
            70% { transform: scale(0.9) rotate(720deg); }
            100% { transform: scale(1) rotate(720deg); }
        }

        .loader-wrapper {
            position: absolute;
            bottom: 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loader-container {
            width: 450px;
            height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid rgba(var(--c-sec-rgb), 0.3);
            position: relative;
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--c-prim), var(--c-sec));
            box-shadow: 0 0 15px var(--c-sec);
            transition: width 0.1s linear;
        }

        .boot-text {
            margin-top: 20px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--c-sec);
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* --- DASHBOARD --- */
        .gc-dashboard {
            opacity: 0;
            visibility: hidden;
            position: relative;
            width: 800px;
            height: 800px;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        .gc-dashboard.visible {
            opacity: 1;
            visibility: visible;
        }

        .gc-dashboard.start-anim {
            transform: scale(3);
            opacity: 0;
            pointer-events: none;
        }

        .ambient-glow {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(var(--c-sec-rgb),0.3) 0%, transparent 60%);
            border-radius: 50%; pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .cube-container {
            perspective: 1000px;
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            cursor: grab;
            z-index: 10;
        }

        .cube {
            width: 120px; height: 120px;
            transform-style: preserve-3d;
        }

        .face {
            position: absolute; width: 120px; height: 120px;
            background: rgba(var(--c-prim-rgb), 0.4);
            border: 2px solid var(--c-sec);
            box-shadow: inset 0 0 20px rgba(var(--c-sec-rgb), 0.6);
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.5s, border-color 0.5s, box-shadow 0.5s;
        }

        .front  { transform: translateZ(60px); }
        .back   { transform: rotateY(180deg) translateZ(60px); }
        .right  { transform: rotateY(90deg) translateZ(60px); }
        .left   { transform: rotateY(-90deg) translateZ(60px); }
        .top    { transform: rotateX(90deg) translateZ(60px); }
        .bottom { transform: rotateX(-90deg) translateZ(60px); }

        .cube.flat .front  { transform: translateZ(0px); }
        .cube.flat .back   { transform: rotateY(180deg) translateZ(0px); }
        .cube.flat .right  { transform: rotateY(90deg) translateZ(0px); }
        .cube.flat .left   { transform: rotateY(-90deg) translateZ(0px); }
        .cube.flat .top    { transform: rotateX(90deg) translateZ(0px); }
        .cube.flat .bottom { transform: rotateX(-90deg) translateZ(0px); }

        .menu-item {
            position: absolute; text-align: center; text-transform: uppercase;
            letter-spacing: 2px; font-size: 24px; font-weight: bold;
            text-shadow: 0 0 8px rgba(var(--c-sec-rgb), 0.8); cursor: pointer;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .menu-item span { display: block; transition: transform 0.2s, color 0.5s, text-shadow 0.5s; }
        .menu-item small { font-size: 16px; color: #a3a3a3; letter-spacing: 1px; }

        .menu-item:hover span {
            transform: scale(1.15); color: #ffffff;
            text-shadow: 0 0 15px #ffffff, 0 0 30px var(--c-sec);
        }

        .top-menu { top: 10%; left: 50%; transform: translate(-50%, 0); }
        .bottom-menu { bottom: 10%; left: 50%; transform: translate(-50%, 0); }
        .left-menu { top: 50%; left: 5%; transform: translate(0, -50%); }
        .right-menu { top: 50%; right: 5%; transform: translate(0, -50%); }

        .gc-dashboard.boot-complete .menu-item,
        .gc-dashboard.boot-complete .ambient-glow {
            opacity: 1;
        }

        /* --- CONTENT SCREEN --- */
        .content-screen {
            display: none;
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, rgba(51, 153, 255, 0.25), #000);
            flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.5s;
        }

        .content-screen::before {
            content: "";
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px);
            pointer-events: none; z-index: 10;
        }

        .content-box {
            position: relative;
            width: 80%; max-width: 1200px; height: 80%; max-height: 800px;
            border: 4px solid var(--c-sec);
            background: linear-gradient(135deg, rgba(var(--c-prim-rgb), 0.8), rgba(51, 153, 255, 0.35));
            box-shadow: 0 0 20px rgba(var(--c-sec-rgb), 0.5), inset 0 0 30px rgba(0,0,0,0.8);
            border-radius: 15px;
            display: flex; flex-direction: column;
            overflow: hidden; z-index: 1;
            transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
        }

        .content-header {
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-bottom: 2px solid var(--c-sec);
            display: flex; justify-content: space-between; align-items: center;
        }

        .content-header h1 { 
            margin: 0; font-size: 32px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 2px 2px 0 #000; 
        }

        .content-body {
            padding: 40px; flex-grow: 1; overflow-y: auto; position: relative;
            font-size: 18px;
        }

        .content-body::-webkit-scrollbar { width: 10px; }
        .content-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .content-body::-webkit-scrollbar-thumb { background: var(--c-sec); border-radius: 5px; }

        .back-btn-container {
            position: absolute; bottom: 35px; right: 45px;
            display: flex; align-items: center; gap: 15px; z-index: 5;
            transition: all 0.3s ease-in-out;
        }

        .back-left {
            right: auto !important;
            left: 45px !important;
            flex-direction: row-reverse !important;
        }

        .back-btn-label {
            font-size: 20px; text-transform: uppercase; font-weight: bold; text-shadow: 2px 2px 0 #000;
        }

        .back-btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: #ffffff; color: var(--c-prim);
            border: 2px solid #e0e0e0;
            box-shadow: 0 8px 0 #cccccc, 0 12px 12px rgba(0,0,0,0.5);
            font-weight: bold; font-size: 30px; font-family: inherit;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: all 0.1s; text-shadow: none;
        }

        .back-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #cccccc, 0 4px 5px rgba(0,0,0,0.5);
        }

        /* --- GAME PAGE SPECIFICS --- */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .image-window {
            border: 2px solid var(--c-sec);
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            aspect-ratio: 16/9;
            width: 100%;
        }

        .image-window:hover {
            transform: scale(1.01) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6), 0 0 15px var(--c-sec);
        }

        .image-window img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sticky-note {
            background: #2a2a2a;
            border-left: 4px solid var(--c-sec);
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            color: #fff;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .sticky-note::before {
            content: "> CONSOLE_LOG";
            display: block;
            font-size: 10px;
            color: var(--c-sec);
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .yt-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #ff0000;
            color: #fff;
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 30px;
            transition: transform 0.2s, background 0.2s;
            border: 2px solid #fff;
        }

        .yt-link:hover {
            transform: scale(1.05);
            background: #cc0000;
        }


        /* --- CHARACTER VIEWER STYLES --- */
        .char-viewer-layout {
            display: flex; align-items: center; justify-content: space-between; gap: 40px; height: 100%; padding-bottom: 20px;
        }

        .char-info { flex: 1.2; display: flex; flex-direction: column; gap: 15px; }

        .char-info h2 {
            font-size: 42px; margin: 0; color: var(--c-sec); text-transform: uppercase;
            letter-spacing: 4px; text-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        .char-info p {
            font-size: 18px; line-height: 1.5; color: #efefef; background: rgba(0,0,0,0.3);
            padding: 15px; border-radius: 10px; border-left: 4px solid var(--c-sec); margin: 0;
        }

        .char-viewer-right { flex: 0.8; display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .char-image-container {
            width: 100%; max-width: 300px; aspect-ratio: 1400 / 2619;
            background: rgba(0,0,0,0.5); border: 4px solid var(--c-sec); border-radius: 20px;
            overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(var(--c-sec-rgb), 0.3);
            display: flex; justify-content: center; align-items: center; cursor: grab;
        }

        .char-image-container:active { cursor: grabbing; }
        .char-image-container img { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.2s ease-in-out; pointer-events: none; }

        .char-viewer-controls { display: flex; gap: 40px; justify-content: center; align-items: center; }

        .char-ctrl-btn {
            background: #ffffff; color: var(--c-prim); border: 2px solid #e0e0e0;
            width: 55px; height: 55px; font-weight: bold; font-size: 24px;
            cursor: pointer; border-radius: 50%; box-shadow: 0 6px 0 #cccccc, 0 8px 10px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center; transition: all 0.1s;
        }

        .char-ctrl-btn:hover { background: #fff; transform: scale(1.05); }
        .char-ctrl-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #cccccc, 0 2px 5px rgba(0,0,0,0.3); }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 85%;
            max-height: 70%;
            border: 4px solid #fff;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }

        #lightbox-info {
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 20px;
            margin-top: 20px;
            max-width: 800px;
            width: 85%;
            border-left: 4px solid var(--c-sec);
            text-align: left;
            animation: slideUp 0.3s ease-out;
            cursor: default;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #lightbox-title {
            margin: 0 0 10px 0;
            font-size: 24px;
            text-transform: uppercase;
            color: var(--c-sec);
            letter-spacing: 2px;
        }

        #lightbox-desc {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            color: #ccc;
        }

        /* --- ORIGINAL STYLES CONTINUED --- */
        .save-file {
            border: 2px solid rgba(var(--c-sec-rgb),0.4); padding: 15px; margin-bottom: 15px; 
            background: rgba(0,0,0,0.4); border-radius: 8px; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .save-file:hover { 
            background: rgba(0,0,0,0.7); 
            box-shadow: 0 0 15px rgba(var(--c-sec-rgb), 0.4); 
            border-color: var(--c-sec); 
            transform: scale(1.02); 
        }
        .save-file h3 { margin: 0 0 5px 0; color: #fff; transition: 0.2s; }
        .save-file p { margin: 0; color: #aaa; font-size: 14px; transition: 0.2s; }
        .save-file:hover p { color: #fff; }
        
        .stat-group { margin-bottom: 15px; }
        .stat-label { font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .stat-bar { width: 100%; height: 18px; background: #000; border: 2px solid var(--c-prim); border-radius: 10px; overflow: hidden; }
        .stat-fill { height: 100%; background: linear-gradient(90deg, var(--c-sec), #ffffff); width: 0%; transition: width 1s cubic-bezier(0.1, 0.7, 0.1, 1); box-shadow: 0 0 10px var(--c-sec); }

        @media (max-width: 768px) {
            .gc-dashboard { width: 100vw; height: 100vh; }
            .ambient-glow { width: 80vw; height: 80vw; }
            .loader-container { width: 80%; }
            .boot-cube { width: 80px; height: 80px; }
            .cube, .face { width: 80px; height: 80px; }
            .front  { transform: translateZ(40px); }
            .back   { transform: rotateY(180deg) translateZ(40px); }
            .right  { transform: rotateY(90deg) translateZ(40px); }
            .left   { transform: rotateY(-90deg) translateZ(40px); }
            .top    { transform: rotateX(90deg) translateZ(40px); }
            .bottom { transform: rotateX(-90deg) translateZ(40px); }
            .menu-item { font-size: 16px; white-space: nowrap; }
            .left-menu { left: 0; transform: translateY(-50%) rotate(-90deg); margin-left: -25px; }
            .right-menu { right: 0; transform: translateY(-50%) rotate(90deg); margin-right: -25px; }
            .char-viewer-layout { flex-direction: column; gap: 20px; overflow-y: auto; }
            .content-box { width: 95%; height: 90%; }
            .content-body { padding: 15px; padding-bottom: 85px; }
            .back-btn-container { bottom: 15px; left: 15px; right: auto; flex-direction: row-reverse; }
            .back-btn-container.back-left { left: 15px; flex-direction: row-reverse; }
        }
    </style>
</head>
<body>

    <!-- Lightbox for Image Expansion -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Expanded View">
        <div id="lightbox-info" onclick="event.stopPropagation()">
            <h3 id="lightbox-title">Title</h3>
            <p id="lightbox-desc">Description</p>
        </div>
    </div>

    <!-- Boot Overlay -->
    <div id="boot-screen">
        <div class="boot-cube"></div>
        <div class="loader-wrapper">
            <div class="loader-container">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <div class="boot-text" id="boot-status">Reading Disc...</div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="gc-dashboard" id="main-menu">
        <div class="ambient-glow"></div>
        <div class="cube-container">
            <div class="cube flat">
                <div class="face front"></div> <div class="face back"></div>
                <div class="face right"></div> <div class="face left"></div>
                <div class="face top"></div> <div class="face bottom"></div>
            </div>
        </div>

        <div class="menu-item top-menu" onclick="openSection('Disc Channel - Projects')">
            <span>Game Play<br><small>Projects</small></span>
        </div>
        <div class="menu-item bottom-menu" onclick="openSection('Options - Contact')">
            <span>Options<br><small>Contact</small></span>
        </div>
        <div class="menu-item left-menu" onclick="openSection('Memory Card - Skills')">
            <span>Memory Card<br><small>Skills</small></span>
        </div>
        <div class="menu-item right-menu" onclick="openSection('Calendar - About Me')">
            <span>Calendar<br><small>About Me</small></span>
        </div>
    </div>

    <div class="content-screen" id="content-screen">
        <div class="content-box">
            <div class="content-header">
                <h1 id="content-title">Title</h1>
                <span id="sys-status" style="font-weight: bold;">[ SYSTEM OK ]</span>
            </div>
            <div class="content-body" id="content-body">
                <!-- Dynamischer Inhalt -->
            </div>
            
            <div class="back-btn-container">
                <span class="back-btn-label">Back</span>
                <button class="back-btn" onclick="closeSection()">B</button>
            </div>
        </div>
    </div>

    <script>
        const bootScreen = document.getElementById('boot-screen');
        const loaderBar = document.getElementById('loader-bar');
        const bootStatus = document.getElementById('boot-status');
        const menu = document.getElementById('main-menu');
        const screen = document.getElementById('content-screen');
        const title = document.getElementById('content-title');
        const contentBody = document.getElementById('content-body');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxTitle = document.getElementById('lightbox-title');
        const lightboxDesc = document.getElementById('lightbox-desc');

        const interactiveCube = document.querySelector('.cube');
        const cubeContainer = document.querySelector('.cube-container');
        let isDraggingCube = false;
        let rotX = 0, rotY = 0;
        let velX = 0, velY = 0;
        let targetVelX = 0;
        let targetVelY = 0; 
        let startMouseX, startMouseY;
        let currentMode = 'light';
        let lastThemeSwitchTime = 0;
        const THEME_COOLDOWN = 1500;

        let charIndex = 0;
        const charImages = ['front.png', 'left.png', 'back.png', 'right.png'];
        let charDragStartX = 0, isDraggingChar = false;

        window.addEventListener('DOMContentLoaded', () => {
            runBootSequence();
        });

        function runBootSequence() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                loaderBar.style.width = progress + '%';
                if (progress > 40) bootStatus.innerText = "Loading Kernel...";
                if (progress > 80) bootStatus.innerText = "Ready!";
                if (progress === 100) {
                    clearInterval(interval);
                    setTimeout(finishBoot, 800);
                }
            }, 150);
        }

        function finishBoot() {
            bootScreen.style.opacity = '0';
            document.body.style.background = 'radial-gradient(circle at center, var(--c-prim) 0%, var(--c-bg) 100%)';
            menu.classList.add('visible');
            setTimeout(() => {
                bootScreen.style.display = 'none';
                interactiveCube.classList.remove('flat');
                targetVelX = 0.15;
                targetVelY = 0.3;
                menu.classList.add('boot-complete');
            }, 800);
        }

        function expandImage(src, t, d) {
            history.pushState({ view: 'lightbox' }, '');
            lightboxImg.src = src;
            lightboxTitle.innerText = t;
            lightboxDesc.innerText = d;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            if (lightbox.style.display === 'flex') {
                history.back();
            }
        }

        window.cycleChar = function(dir) {
            charIndex = (charIndex + dir + charImages.length) % charImages.length;
            const imgEl = document.getElementById('char-avatar-img');
            if (imgEl) {
                imgEl.style.opacity = '0';
                setTimeout(() => {
                    imgEl.src = charImages[charIndex];
                    imgEl.style.opacity = '1';
                }, 100);
            }
        };

        window.startCharDrag = function(e) {
            isDraggingChar = true;
            charDragStartX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        };

        function handleCharDrag(e) {
            if (!isDraggingChar) return;
            const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const diff = currentX - charDragStartX;
            if (Math.abs(diff) > 50) {
                cycleChar(diff > 0 ? -1 : 1);
                charDragStartX = currentX;
            }
        }

        function openSection(sectionName) {
            history.pushState({ view: 'content' }, '');
            menu.classList.add('start-anim');
            sectionName.includes('About Me') ? document.querySelector('.back-btn-container').classList.add('back-left') : document.querySelector('.back-btn-container').classList.remove('back-left');
            setTimeout(() => {
                menu.style.display = 'none';
                screen.style.display = 'flex';
                title.innerText = sectionName;
                
                let html = '';
                if (sectionName.includes('Disc Channel')) {
                    html = `
                                            <div style="display: flex; flex-direction: column; gap: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 20px;">
                            <div style="flex: 2; min-width: 300px;">

                } else if (sectionName.includes('Memory Card')) {

                        <div class="stat-group"><span class="stat-label">French (Intermediate)</span><div class="stat-bar"><div class="stat-fill" data-width="50%"></div></div></div>
                        
                        <h2 style="margin-top: 30px;">IT Skills & Misc</h2>
                        <div class="save-file" style="cursor: default;">

                                <p style="font-size: 15px; margin-top: 5px;">Driver's License (Class B)</p>

                    `;
                } else if (sectionName.includes('Options')) {
                    html = `
                        <h2>Contact</h2>
                        <p style="margin-bottom: 20px;">Ready for the next level? Send me a message:</p>
                        <a href="mailto:dominikadelmann50@gmail.com" style="text-decoration: none; color: inherit;">

                                <div><h3 style="color: var(--c-sec);">Send Email</h3><p>dominikadelmann50@gmail.com</p></div>

                        <div class="save-file" onclick="copyEmail()">

                } else {
                    html = `
                        <div class="char-viewer-layout">
                            <div class="char-info">
                                <h2>Dominik Adelmann </h2>
                                <p>Welcome to my digital realm, where you can see alot about... me :)</p>
                                <p>My name is Dominik, I'm 19 years old and I live in a small town called Lüdenscheid in North Rhine-Westphalia, Germany. I am passionate about video games and media design, and I've always been fascinated by how games are created.
                                    I have a strong interest in retro games, which probably comes from growing up with Nintendo and PlayStation titles. However, my curiosity goes far beyond just playing. I'm especially interested in what happens behind the scenes: How was a game built? How many people worked on it? Where did the idea come from? Are there early prototypes or unused concepts?
                                    This interest in the background and history of games has shaped the way I look at them. For me, games are not just entertainment, but complex creative projects that combine design, technology, and storytelling.</p>
                                <p>I have also actively participated in playtesting for various games, including ARC Raiders, and have taken part in feedback sessions and meetings with developers, such as those at EA. This gave me insight into how games are tested, improved, and discussed during development.
                                Additionally, I have basic experience with Unity and Roblox Studio, which I have used to experiment with game mechanics and design. Through this, I also developed a small game concept in Roblox, further strengthening my understanding of how games are built from the ground up.</p>
                            </div>

                                    <button class="char-ctrl-btn" onclick="cycleChar(-1)">◀</button>
                                    <button class="char-ctrl-btn" onclick="cycleChar(1)">▶</button>
                                </div>
                            </div>
                        </div>`;
                }
                contentBody.innerHTML = html;

                setTimeout(() => { 
                    screen.style.opacity = '1'; 
                    document.querySelectorAll('.stat-fill').forEach(bar => {
                        bar.style.width = bar.getAttribute('data-width') || '0%';
                    });
                }, 50);
            }, 800);
        }

        function closeSection(fromHistory = false) {
            if (fromHistory !== true) {
                history.back();
                return;
            }
            screen.style.opacity = '0';
            setTimeout(() => {
                screen.style.display = 'none';
                menu.style.display = 'block';
                setTimeout(() => { menu.classList.remove('start-anim'); }, 50);
            }, 500);
        }

        window.addEventListener('popstate', (event) => {
            if (lightbox.style.display === 'flex') {
                lightbox.style.display = 'none';
            } else if (screen.style.display === 'flex') {
                closeSection(true);
            }
        });

        window.copyEmail = function() {
            const tempInput = document.createElement("input");
            tempInput.value = "dominikadelmann50@gmail.com";
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            const btn = document.getElementById('copy-btn-text');
            if(btn) {
                btn.innerText = 'Copied!';
                setTimeout(() => { if(document.getElementById('copy-btn-text')) btn.innerText = 'Copy >'; }, 2000);
            }
        };

        function animateCube() {
            if (!isDraggingCube) {
                velX += (targetVelX - velX) * 0.05;
                velY += (targetVelY - velY) * 0.05;
            }
            rotX += velX;
            rotY += velY;
            interactiveCube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(animateCube);
        }
        
        animateCube();

        function setTheme(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            if (mode === 'dark') {
                document.documentElement.style.setProperty('--c-prim', '#1a1a1a');
                document.documentElement.style.setProperty('--c-prim-rgb', '26, 26, 26');
                document.documentElement.style.setProperty('--c-sec', '#3399ff');
                document.documentElement.style.setProperty('--c-sec-rgb', '51, 153, 255');
                document.documentElement.style.setProperty('--c-bg', '#000000');
            } else {
                document.documentElement.style.setProperty('--c-prim', '#666666');
                document.documentElement.style.setProperty('--c-prim-rgb', '102, 102, 102');
                document.documentElement.style.setProperty('--c-sec', '#ffffff');
                document.documentElement.style.setProperty('--c-sec-rgb', '255, 255, 255');
                document.documentElement.style.setProperty('--c-bg', '#1a1a1a');
            }
            if (menu.classList.contains('visible')) {
                document.body.style.background = `radial-gradient(circle at center, var(--c-prim) 0%, var(--c-bg) 100%)`;
            }
        }

        function startDrag(e) {
            if (e.type === 'mousedown') e.preventDefault();
            isDraggingCube = true;
            startMouseX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            startMouseY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            cubeContainer.style.cursor = 'grabbing';
        }

        function drag(e) {
            if (isDraggingCube) {
                let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                let deltaX = clientX - startMouseX;
                let deltaY = clientY - startMouseY;
                velY = deltaX * 0.8;
                velX = -deltaY * 0.8;
                const now = Date.now();
                if (now - lastThemeSwitchTime > THEME_COOLDOWN) {
                    if (velY > 65 && currentMode !== 'dark') { setTheme('dark'); lastThemeSwitchTime = now; }
                    else if (velY < -65 && currentMode !== 'light') { setTheme('light'); lastThemeSwitchTime = now; }
                }
                startMouseX = clientX;
                startMouseY = clientY;
            }
            if (isDraggingChar) handleCharDrag(e);
        }

        function stopDrag() {
            isDraggingCube = false;
            isDraggingChar = false;
            cubeContainer.style.cursor = 'grab';
        }

        cubeContainer.addEventListener('mousedown', startDrag);
        cubeContainer.addEventListener('touchstart', startDrag, {passive: true});
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: true});
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);
        document.addEventListener('mouseleave', stopDrag);
    </script>
</body>
